<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Component Picker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: transparent; overflow: hidden; }
    body {
      font-family: 'Consolas','Cascadia Code','Courier New',monospace;
      -webkit-user-select: none; user-select: none;
    }

    /* ── Popup (matches the lasso/box-select popup) ── */
    #cp-popup {
      position: absolute; left: 12px; top: 12px;
      width: 380px; max-height: calc(100% - 24px);
      display: flex; flex-direction: column;
      background: #080808; border: 1px solid #222; border-radius: 6px;
      box-shadow: 0 16px 56px rgba(0,0,0,0.92), 0 0 0 1px rgba(255,255,255,0.04);
      overflow: hidden;
    }
    .cp-titlebar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px 4px 16px; -webkit-app-region: drag;
    }
    .cp-drag { flex: 1; height: 14px; }
    /* Section titles — same style as the old popup title */
    .cp-section-title {
      display: block; margin-bottom: 6px;
      font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: 0.18em;
      text-transform: uppercase; color: #fff;
    }
    .cp-close {
      -webkit-app-region: no-drag;
      background: none; border: none; color: #444; font-size: 13px;
      cursor: pointer; padding: 2px 5px; border-radius: 3px; line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .cp-close:hover { background: #2a2a2a; color: #ccc; }

    .cp-prompt {
      margin: 2px 0 10px;
      font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
      font-size: 11.5px; line-height: 1.45; color: #888;
    }

    .cp-loc { padding: 0 16px 12px; }
    .cp-label {
      font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #555; display: block; margin-bottom: 4px;
    }
    .cp-loc-link {
      display: inline-block; max-width: 100%;
      font-size: 12px; color: #22d3ee; cursor: pointer;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      border-bottom: 1px dashed transparent;
    }
    .cp-loc-link:hover { border-bottom-color: currentColor; }

    .cp-divider { height: 1px; background: #1c1c1c; }

    .cp-comp { display: flex; flex-direction: column; min-height: 0; padding: 12px 16px 0; }
    .cp-comp-head { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; margin-bottom: 6px; }
    .cp-dock {
      flex-shrink: 0; width: 26px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid #2a2a2a; border-radius: 5px;
      color: #888; cursor: pointer; transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .cp-dock:hover { color: #ccc; border-color: #444; }
    .cp-dock.active { color: #22d3ee; border-color: #22406a; background: #0e1a1a; }
    /* When the preview panel is docked, the per-row eye buttons disappear */
    body.docked .cp-eye { display: none; }
    #cp-search {
      width: 100%; margin: 6px 0 8px;
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 5px;
      color: #ccc; font-size: 12px; padding: 7px 10px; outline: none;
      font-family: inherit; transition: border-color 0.12s;
    }
    #cp-search:focus { border-color: #3a3a3a; }
    #cp-search::placeholder { color: #444; }

    #cp-list {
      max-height: 202px; overflow-y: auto;   /* ~5 rows */
      margin: 0 -4px;
    }
    #cp-list::-webkit-scrollbar { width: 5px; }
    #cp-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .cp-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 5px; cursor: pointer;
    }
    .cp-item:hover, .cp-item.selected { background: #141414; }
    .cp-item.selected { box-shadow: inset 0 0 0 1px #2c3e44; }
    .cp-item-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .cp-item-title { font-size: 12px; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cp-item-name  { font-size: 10px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cp-eye {
      flex-shrink: 0; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      color: #555; border-radius: 4px; cursor: pointer;
      transition: color 0.1s, background 0.1s;
    }
    .cp-eye:hover { color: #22d3ee; background: #15201f; }
    .cp-loading { font-size: 12px; color: #666; padding: 14px 8px; text-align: center; }
    .cp-error { color: #f06060; }

    #cp-instructions {
      width: 100%; margin: 12px 0 0; min-height: 54px; resize: none;
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 5px;
      color: #ccc; font-size: 12px; padding: 8px 10px; outline: none;
      font-family: inherit; line-height: 1.5; transition: border-color 0.12s;
    }
    #cp-instructions:focus { border-color: #3a3a3a; }
    #cp-instructions::placeholder { color: #444; }

    .cp-footer { padding: 12px 16px 14px; }
    #cp-insert {
      width: 100%; padding: 9px; border: none; border-radius: 6px;
      background: #4a9eff; color: #fff; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
      transition: filter 0.12s, background 0.12s;
    }
    #cp-insert:hover { filter: brightness(1.1); }
    #cp-insert:disabled { background: #1a1a1a; color: #555; cursor: default; filter: none; }

    /* ── Preview flyout (beside the hovered row) ── */
    #cp-flyout {
      position: absolute;
      width: 340px;
      background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 6px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.9);
      overflow: hidden;
      opacity: 0; transform: translateX(-12px); pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #cp-flyout.show { opacity: 1; transform: translateX(0); pointer-events: auto; }
    /* Docked panel is taller (pinned open beside the popup) */
    #cp-flyout.docked #cp-flyout-iframe,
    #cp-flyout.docked #cp-flyout-loading { height: 500px; }
    #cp-flyout-cap {
      font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
      font-size: 10px; font-weight: 600; color: #999;
      padding: 7px 10px; border-bottom: 1px solid #1c1c1c;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #cp-flyout-iframe { width: 100%; height: 210px; border: none; background: #fff; display: block; }
    #cp-flyout-loading {
      position: absolute; left: 0; right: 0; bottom: 0; height: 210px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #666; background: #0a0a0a;
    }
  </style>
</head>
<body>
  <div id="cp-popup">
    <div class="cp-titlebar">
      <span class="cp-drag"></span>
      <button class="cp-close" id="cp-close" title="Close">✕</button>
    </div>
    <div class="cp-loc">
      <span class="cp-section-title">Selected location</span>
      <span class="cp-loc-link" id="cp-loc-link" title=""></span>
    </div>
    <div class="cp-divider"></div>
    <div class="cp-comp">
      <div class="cp-comp-head">
        <span class="cp-section-title" style="margin:0">Select component</span>
        <button class="cp-dock" id="cp-dock" title="Show preview panel"></button>
      </div>
      <div class="cp-prompt">Select a Storybook component to insert at the target location.</div>
      <input id="cp-search" type="text" placeholder="Search components…" autocomplete="off" spellcheck="false"/>
      <div id="cp-list"></div>
      <textarea id="cp-instructions" placeholder="Instructions — how to use this component at the target (optional)…"></textarea>
    </div>
    <div class="cp-footer">
      <button id="cp-insert" disabled>Insert Component</button>
    </div>
  </div>

  <div id="cp-flyout">
    <div id="cp-flyout-cap"></div>
    <iframe id="cp-flyout-iframe" src="about:blank"></iframe>
    <div id="cp-flyout-loading" style="display:none">Loading preview…</div>
  </div>

  <script src="component-picker-renderer.js"></script>
</body>
</html>
