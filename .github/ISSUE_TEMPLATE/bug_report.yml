name: Bug report
description: Report a problem with Cathode Terminal
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows (WSL)
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Cathode version
      placeholder: "e.g. 1.0.0"
  - type: input
    id: agent
    attributes:
      label: Agent (if relevant)
      placeholder: "e.g. Claude Code, Hermes"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant errors, terminal output, or screenshots.
