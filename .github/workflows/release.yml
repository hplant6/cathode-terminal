name: Release

# Tag a version (e.g. `git tag v1.0.0 && git push --tags`) to build all three
# platforms on their native runners and attach the installers to a GitHub
# Release. `workflow_dispatch` builds + uploads artifacts without a release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create/update the Release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: 'dist:win'
          - os: macos-latest
            script: 'dist:mac'
          - os: ubuntu-latest
            script: 'dist:linux'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # postinstall runs `electron-builder install-app-deps`, which rebuilds
      # node-pty from source per-platform (Linux has no prebuild). The runners
      # ship the needed toolchain (python3 + build tools).
      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.script }})
        run: npm run ${{ matrix.script }}
        env:
          # Real Developer ID signing on macOS only. CSC_LINK (base64 .p12) is a mac
          # cert, so it must NOT reach the Windows/Linux builds — scope it to macOS and
          # leave the others with signing disabled (adhoc-sign.js stands down when
          # CSC_LINK is set; notarize.js notarizes via the APPLE_* secrets).
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.os == 'macos-latest' && 'true' || 'false' }}
          # macOS notarization — read by scripts/notarize.js (skipped when unset).
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cathode-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
          # Tags with a suffix (v1.0.0-rc.1, -beta…) publish as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
